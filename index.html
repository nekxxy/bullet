<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BULLET TIME — Day 1</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #222; overflow: hidden;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #wrap { position: relative; }
  canvas {
    display: block;
    background: #fff;
    border: 1px solid #000;
    cursor: crosshair;
  }
  #hud {
    position: absolute; top: 8px; left: 8px;
    color: #000; background: rgba(255,255,255,0.9);
    padding: 6px 10px; font-size: 12px; line-height: 1.5;
    border: 1px solid #000; pointer-events: none;
    white-space: pre;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="800"></canvas>
  <div id="hud"></div>
</div>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');
  const W = canvas.width, H = canvas.height;

  // ---------- Tunables ----------
  const PLAYER_SPEED      = 200;   // px/sec, REAL time
  const PLAYER_RADIUS     = 8;
  const BULLET_SPEED      = 320;   // px/sec, WORLD time
  const BULLET_RADIUS     = 4;
  const SHOOT_INTERVAL    = 1.5;   // sec, WORLD time
  const SMOOTH_WINDOW_MS  = 150;   // mouse-velocity smoothing window
  const MAX_MOUSE_VEL     = 1000;  // px/sec → time scale clamps to 1.0
  const TIME_CURVE        = 1.5;   // exponent: >1 = slow movement feels more cinematic
  const PLAYER_BULLET_SPEED = 600; // px/sec, WORLD time — fast enough to feel responsive
  const PLAYER_BULLET_RADIUS = 3;
  const FIRE_COOLDOWN     = 0.15;  // sec, REAL time — prevents pre-frozen spam
  const SHOOTER_RADIUS    = 14;

  // ---------- Input ----------
  const keys = new Set();
  addEventListener('keydown', e => keys.add(e.key.toLowerCase()));
  addEventListener('keyup',   e => keys.delete(e.key.toLowerCase()));

  // Listen on window so we still track the mouse if it leaves the canvas.
  let mouseX = W / 2, mouseY = H / 2;
  let mouseDown = false;
  addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
  });
  addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
  addEventListener('mouseup',   e => { if (e.button === 0) mouseDown = false; });
  // Suppress context menu so right-click reserves cleanly later.
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ---------- THE function to tune ----------
  // Returns { scale, velocity } where scale ∈ [0, 1].
  //
  // Implementation: ring buffer of (x, y, t) samples. We push the CURRENT
  // mouse position every frame (not just on mousemove) — this is critical,
  // because mousemove stops firing when the mouse is still, so without
  // per-frame sampling a stationary mouse would never decay to zero.
  //
  // Smoothing is just average velocity over the window. Mapping is linear:
  // velocity / MAX_MOUSE_VEL, clamped. Swap for a curve later if needed.
  const mouseSamples = []; // {x, y, t}
  function computeTimeScale(nowMs) {
    mouseSamples.push({ x: mouseX, y: mouseY, t: nowMs });
    const cutoff = nowMs - SMOOTH_WINDOW_MS;
    while (mouseSamples.length && mouseSamples[0].t < cutoff) {
      mouseSamples.shift();
    }
    if (mouseSamples.length < 2) return { scale: 0, velocity: 0 };
    let dist = 0;
    for (let i = 1; i < mouseSamples.length; i++) {
      const a = mouseSamples[i - 1], b = mouseSamples[i];
      dist += Math.hypot(b.x - a.x, b.y - a.y);
    }
    const span = (mouseSamples[mouseSamples.length - 1].t - mouseSamples[0].t) / 1000;
    if (span <= 0) return { scale: 0, velocity: 0 };
    const velocity = dist / span;
    // Exponential mapping: pow(vel/MAX, 1.5). Makes slow drags feel cinematic
    // — the world barely creeps until you commit to a real flick.
    const norm = Math.min(1, velocity / MAX_MOUSE_VEL);
    const scale = Math.pow(norm, TIME_CURVE);
    return { scale, velocity };
  }

  // ---------- World ----------
  const player = { x: W / 2, y: H / 2 };

  // Three shooters in a triangle around the arena edge.
  // Stagger initial cooldowns so they don't all fire in lockstep.
  const shooters = [
    { x: W / 2,    y: 60,     cooldown: 1.5 },
    { x: 60,       y: H - 60, cooldown: 1.0 },
    { x: W - 60,   y: H - 60, cooldown: 0.5 },
  ];

  const bullets = [];        // enemy bullets (red)
  const playerBullets = [];  // player bullets (blue)
  let kills = 0;
  let fireTimer = 0;         // REAL-time cooldown
  let elapsed = 0;           // seconds survived (REAL time)
  let nearMisses = 0;
  // 'playing' | 'dead'. Death freezes everything until restart.
  let gameState = 'playing';
  let finalScore = 0;

  function resetGame() {
    bullets.length = 0;
    playerBullets.length = 0;
    shooters.length = 0;
    shooters.push(
      { x: W / 2,  y: 60,     cooldown: 1.5 },
      { x: 60,     y: H - 60, cooldown: 1.0 },
      { x: W - 60, y: H - 60, cooldown: 0.5 },
    );
    player.x = W / 2; player.y = H / 2;
    kills = 0; fireTimer = 0; elapsed = 0; nearMisses = 0; finalScore = 0;
    gameState = 'playing';
  }
  // Restart bindings
  addEventListener('keydown', e => {
    if (gameState === 'dead' && e.key.toLowerCase() === 'r') resetGame();
  });
  addEventListener('mousedown', e => {
    if (gameState === 'dead' && e.button === 0) resetGame();
  });

  // ---------- Loop ----------
  let lastT = performance.now();
  function frame(now) {
    // Clamp huge gaps (tab switch, etc.) so physics doesn't explode.
    const dtReal = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;

    const { scale: timeScale, velocity: mouseVel } = computeTimeScale(now);
    // Death freezes everything (world AND player). Mouse-time scale still
    // displayed in HUD so the player can verify input is registered.
    const dtWorld = gameState === 'playing' ? dtReal * timeScale : 0;
    const dtSim   = gameState === 'playing' ? dtReal : 0;

    if (gameState === 'playing') elapsed += dtReal;

    // --- Player: REAL time, independent of mouse ---
    let dx = 0, dy = 0;
    if (keys.has('w') || keys.has('arrowup'))    dy -= 1;
    if (keys.has('s') || keys.has('arrowdown'))  dy += 1;
    if (keys.has('a') || keys.has('arrowleft'))  dx -= 1;
    if (keys.has('d') || keys.has('arrowright')) dx += 1;
    if ((dx || dy) && gameState === 'playing') {
      const m = Math.hypot(dx, dy);
      player.x += (dx / m) * PLAYER_SPEED * dtSim;
      player.y += (dy / m) * PLAYER_SPEED * dtSim;
    }
    player.x = Math.max(PLAYER_RADIUS, Math.min(W - PLAYER_RADIUS, player.x));
    player.y = Math.max(PLAYER_RADIUS, Math.min(H - PLAYER_RADIUS, player.y));

    // --- Player firing: REAL-time cooldown ---
    fireTimer = Math.max(0, fireTimer - dtSim);
    if (mouseDown && fireTimer <= 0 && gameState === 'playing') {
      const ax = mouseX - player.x, ay = mouseY - player.y;
      const m = Math.hypot(ax, ay) || 1;
      playerBullets.push({
        x: player.x, y: player.y,
        vx: (ax / m) * PLAYER_BULLET_SPEED,
        vy: (ay / m) * PLAYER_BULLET_SPEED,
      });
      fireTimer = FIRE_COOLDOWN;
    }

    // --- Shooters: WORLD time ---
    for (let si = shooters.length - 1; si >= 0; si--) {
      const s = shooters[si];
      s.cooldown -= dtWorld;
      if (s.cooldown <= 0) {
        s.cooldown += SHOOT_INTERVAL;
        const ax = player.x - s.x, ay = player.y - s.y;
        const m = Math.hypot(ax, ay) || 1;
        bullets.push({
          x: s.x, y: s.y,
          vx: (ax / m) * BULLET_SPEED,
          vy: (ay / m) * BULLET_SPEED,
        });
      }
    }

    // --- Player bullets: WORLD time. Pre-aim while frozen, release on flick. ---
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      b.x += b.vx * dtWorld;
      b.y += b.vy * dtWorld;
      // off-screen
      if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
        playerBullets.splice(i, 1);
        continue;
      }
      // vs enemy bullets — both removed
      let consumed = false;
      for (let j = bullets.length - 1; j >= 0; j--) {
        const eb = bullets[j];
        if (Math.hypot(b.x - eb.x, b.y - eb.y) < PLAYER_BULLET_RADIUS + BULLET_RADIUS) {
          bullets.splice(j, 1);
          playerBullets.splice(i, 1);
          consumed = true;
          break;
        }
      }
      if (consumed) continue;
      // vs shooters — kill and remove
      for (let j = shooters.length - 1; j >= 0; j--) {
        const s = shooters[j];
        if (Math.hypot(b.x - s.x, b.y - s.y) < PLAYER_BULLET_RADIUS + SHOOTER_RADIUS) {
          shooters.splice(j, 1);
          playerBullets.splice(i, 1);
          kills++;
          break;
        }
      }
    }

    // --- Bullets: WORLD time ---
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dtWorld;
      b.y += b.vy * dtWorld;
      const d = Math.hypot(b.x - player.x, b.y - player.y);
      // hit
      if (d < BULLET_RADIUS + PLAYER_RADIUS && gameState === 'playing') {
        gameState = 'dead';
        finalScore = Math.floor(kills * 100 + elapsed * 5 + nearMisses * 10);
        bullets.splice(i, 1);
        continue;
      }
      // near-miss: count once per bullet when it passes within 30px without hitting
      if (!b.nearMissed && d < 30 + PLAYER_RADIUS && gameState === 'playing') {
        b.nearMissed = true;
        nearMisses++;
      }
      if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
        bullets.splice(i, 1);
      }
    }

    // --- Render ---
    ctx.clearRect(0, 0, W, H);

    // shooters (black triangles, point at player)
    ctx.fillStyle = '#000';
    for (const s of shooters) {
      const ang = Math.atan2(player.y - s.y, player.x - s.x);
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(14, 0);
      ctx.lineTo(-10, -10);
      ctx.lineTo(-10,  10);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // bullets (enemy, red)
    ctx.fillStyle = '#d00';
    for (const b of bullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, BULLET_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    // player bullets (blue)
    ctx.fillStyle = '#0080ff';
    for (const b of playerBullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, PLAYER_BULLET_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    // aim line (dashed grey, faint) — player → mouse. Sets up cycle-2 gun.
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(mouseX, mouseY);
    ctx.stroke();
    ctx.restore();

    // player (white fill, black outline — outline is critical on white bg)
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, PLAYER_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // HUD
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60).toString().padStart(2, '0');
    hud.textContent =
      `time scale:  ${timeScale.toFixed(2)}\n` +
      `mouse vel:   ${mouseVel.toFixed(0).padStart(4)} px/s\n` +
      `bullets:     ${bullets.length}\n` +
      `kills:       ${kills}\n` +
      `time:        ${mins}:${secs}`;

    // Death overlay
    if (gameState === 'dead') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.font = 'bold 64px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillText('BULLET TIME', W / 2, H / 2 - 80);
      ctx.font = '20px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillText(
        `TIME: ${elapsed.toFixed(1)}s   KILLS: ${kills}   SCORE: ${finalScore}`,
        W / 2, H / 2,
      );
      ctx.font = '16px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillStyle = '#666';
      ctx.fillText('PRESS R OR CLICK TO RESTART', W / 2, H / 2 + 60);
      ctx.textAlign = 'start';
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
