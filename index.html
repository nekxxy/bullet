<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BULLET TIME — Day 1</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #222; overflow: hidden;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #wrap { position: relative; }
  canvas {
    display: block;
    background: #fff;
    border: 1px solid #000;
    cursor: crosshair;
  }
  #hud {
    position: absolute; top: 8px; left: 8px;
    color: #000; background: rgba(255,255,255,0.9);
    padding: 6px 10px; font-size: 12px; line-height: 1.5;
    border: 1px solid #000; pointer-events: none;
    white-space: pre;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="800"></canvas>
  <div id="hud"></div>
</div>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');
  const W = canvas.width, H = canvas.height;

  // ---------- Tunables ----------
  const PLAYER_SPEED      = 200;   // px/sec, REAL time
  const PLAYER_RADIUS     = 8;
  const BULLET_SPEED      = 320;   // px/sec, WORLD time
  const BULLET_RADIUS     = 4;
  const SHOOT_INTERVAL    = 1.5;   // sec, WORLD time
  const SMOOTH_WINDOW_MS  = 150;   // mouse-velocity smoothing window
  const MAX_MOUSE_VEL     = 1000;  // px/sec → time scale clamps to 1.0
  const TIME_CURVE        = 1.5;   // exponent: >1 = slow movement feels more cinematic
  const PLAYER_BULLET_SPEED = 600; // px/sec, WORLD time — fast enough to feel responsive
  const PLAYER_BULLET_RADIUS = 3;
  const FIRE_COOLDOWN     = 0.15;  // sec, REAL time — prevents pre-frozen spam
  const SHOOTER_RADIUS    = 14;
  const TRAIL_LEN         = 8;     // frames of bullet trajectory remembered (world time)

  // ---------- Input ----------
  const keys = new Set();
  addEventListener('keydown', e => keys.add(e.key.toLowerCase()));
  addEventListener('keyup',   e => keys.delete(e.key.toLowerCase()));

  // Listen on window so we still track the mouse if it leaves the canvas.
  let mouseX = W / 2, mouseY = H / 2;
  let mouseDown = false;
  addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
  });
  addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
  addEventListener('mouseup',   e => { if (e.button === 0) mouseDown = false; });
  // Suppress context menu so right-click reserves cleanly later.
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ---------- THE function to tune ----------
  // Returns { scale, velocity } where scale ∈ [0, 1].
  //
  // Implementation: ring buffer of (x, y, t) samples. We push the CURRENT
  // mouse position every frame (not just on mousemove) — this is critical,
  // because mousemove stops firing when the mouse is still, so without
  // per-frame sampling a stationary mouse would never decay to zero.
  //
  // Smoothing is just average velocity over the window. Mapping is linear:
  // velocity / MAX_MOUSE_VEL, clamped. Swap for a curve later if needed.
  const mouseSamples = []; // {x, y, t}
  function computeTimeScale(nowMs) {
    mouseSamples.push({ x: mouseX, y: mouseY, t: nowMs });
    const cutoff = nowMs - SMOOTH_WINDOW_MS;
    while (mouseSamples.length && mouseSamples[0].t < cutoff) {
      mouseSamples.shift();
    }
    if (mouseSamples.length < 2) return { scale: 0, velocity: 0 };
    let dist = 0;
    for (let i = 1; i < mouseSamples.length; i++) {
      const a = mouseSamples[i - 1], b = mouseSamples[i];
      dist += Math.hypot(b.x - a.x, b.y - a.y);
    }
    const span = (mouseSamples[mouseSamples.length - 1].t - mouseSamples[0].t) / 1000;
    if (span <= 0) return { scale: 0, velocity: 0 };
    const velocity = dist / span;
    // Exponential mapping: pow(vel/MAX, 1.5). Makes slow drags feel cinematic
    // — the world barely creeps until you commit to a real flick.
    const norm = Math.min(1, velocity / MAX_MOUSE_VEL);
    const scale = Math.pow(norm, TIME_CURVE);
    return { scale, velocity };
  }

  // ---------- World ----------
  const player = { x: W / 2, y: H / 2 };

  // ---------- Wave system ----------
  // Each wave defines a list of shooters by archetype. Wave clears when all
  // are dead. Walker shooters drift toward a random nearby target every ~2s.
  // Patterns: single, triple, radial, spiral. Spirals carry a rotating angle.
  const PATTERNS = ['single', 'triple', 'radial', 'spiral'];

  // Helper: place N shooters evenly around the arena perimeter
  function ringPositions(n, inset = 70) {
    const out = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      out.push({
        x: W / 2 + Math.cos(a) * (W / 2 - inset),
        y: H / 2 + Math.sin(a) * (H / 2 - inset),
      });
    }
    return out;
  }
  function buildShooter(pos, type, pattern, fireInterval) {
    return {
      x: pos.x, y: pos.y,
      type,                 // 'static' | 'walker' | 'boss' (boss in cycle 7)
      pattern,              // see PATTERNS
      cooldown: fireInterval * Math.random(), // stagger
      fireInterval,
      // walker state
      tx: pos.x, ty: pos.y, retargetIn: 2,
      // spiral state
      spiralAngle: 0,
    };
  }
  function makeWave(num) {
    // Rule-based generation per the design doc.
    if (num <= 3) {
      return ringPositions(num).map(p => buildShooter(p, 'static', 'single', 1.5));
    }
    if (num <= 6) {
      const n = Math.min(3, num - 1);
      return ringPositions(n).map(p => buildShooter(p, 'walker', 'single', 1.4));
    }
    if (num <= 9) {
      return ringPositions(3).map(p => buildShooter(p, 'walker', 'triple', 2.2));
    }
    if (num <= 12) {
      return ringPositions(3).map(p => buildShooter(p, 'walker', 'radial', 2.8));
    }
    if (num <= 15) {
      return ringPositions(5).map((p, i) =>
        buildShooter(p, 'walker', i % 2 ? 'triple' : 'radial', 2.4));
    }
    if (num <= 18) {
      return ringPositions(4).map(p => buildShooter(p, 'walker', 'spiral', 0.12));
    }
    if (num === 19) {
      return ringPositions(6).map((p, i) =>
        buildShooter(p, 'walker', PATTERNS[i % 4], i % 4 === 3 ? 0.12 : 1.8));
    }
    if (num === 20) {
      // Boss placeholder — replaced in cycle 7
      return [{
        x: W / 2, y: H / 2, type: 'boss', pattern: 'radial',
        cooldown: 1, fireInterval: 2, tx: W/2, ty: H/2, retargetIn: 2,
        spiralAngle: 0, hp: 100, phase: 1, rot: 0, teleportIn: 3,
      }];
    }
    return [];
  }

  let currentWave = 1;
  let waveClearTimer = 0; // seconds — non-zero during wave-clear flash
  let shooters = makeWave(currentWave);

  function spawnEnemyBullet(s, vx, vy) {
    bullets.push({ x: s.x, y: s.y, vx, vy, trail: [] });
  }
  function shooterFire(s) {
    Audio.enemyFire();
    const ax = player.x - s.x, ay = player.y - s.y;
    const ang = Math.atan2(ay, ax);
    if (s.pattern === 'single') {
      spawnEnemyBullet(s, Math.cos(ang) * BULLET_SPEED, Math.sin(ang) * BULLET_SPEED);
    } else if (s.pattern === 'triple') {
      for (const off of [-Math.PI/12, 0, Math.PI/12]) {
        const a = ang + off;
        spawnEnemyBullet(s, Math.cos(a) * BULLET_SPEED, Math.sin(a) * BULLET_SPEED);
      }
    } else if (s.pattern === 'radial') {
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        spawnEnemyBullet(s, Math.cos(a) * BULLET_SPEED, Math.sin(a) * BULLET_SPEED);
      }
    } else if (s.pattern === 'spiral') {
      const a = s.spiralAngle;
      spawnEnemyBullet(s, Math.cos(a) * BULLET_SPEED, Math.sin(a) * BULLET_SPEED);
      s.spiralAngle += 0.5; // radians per shot
    }
  }


  const bullets = [];        // enemy bullets (red)
  const playerBullets = [];  // player bullets (blue)
  let kills = 0;
  let fireTimer = 0;         // REAL-time cooldown
  let elapsed = 0;           // seconds survived (REAL time)
  let nearMisses = 0;
  // 'playing' | 'dead'. Death freezes everything until restart.
  let gameState = 'playing';
  let finalScore = 0;
  // Visual juice state. Shake decays in REAL time so it lands instantly even
  // when the world is frozen — kills should always feel responsive.
  let shakeTime = 0;
  const SHAKE_DURATION = 0.4;
  const SHAKE_AMPLITUDE = 8;
  let muzzleFlash = 0;       // frames remaining (1-frame flash on fire)

  // ---------- Audio (Web Audio, all procedural — zero asset files) ----------
  // Lazily initialized on first user gesture (browsers block autoplay).
  // Single AudioContext + master gain for mute control.
  const Audio = (() => {
    let ctx = null, master = null, muted = false;
    let lastWhoosh = 0, lastHeartbeat = 0, fastInputSince = 0;
    let noiseBuf = null;

    function ensure() {
      if (ctx) return ctx;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.5;
      master.connect(ctx.destination);
      // Pre-build 1s of white noise — reused for all noise-based sounds.
      const n = ctx.sampleRate;
      noiseBuf = ctx.createBuffer(1, n, n);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
      return ctx;
    }

    function tone(freq, dur, type='sine', gain=0.3, slideTo=null) {
      if (!ensure() || muted) return;
      const t0 = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      if (slideTo != null) o.frequency.linearRampToValueAtTime(slideTo, t0 + dur);
      g.gain.setValueAtTime(gain, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g).connect(master);
      o.start(t0);
      o.stop(t0 + dur);
    }

    function noise(dur, filterFreq, gain=0.3) {
      if (!ensure() || muted) return;
      const t0 = ctx.currentTime;
      const src = ctx.createBufferSource();
      src.buffer = noiseBuf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = filterFreq;
      const g = ctx.createGain();
      g.gain.setValueAtTime(gain, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      src.connect(filt).connect(g).connect(master);
      src.start(t0);
      src.stop(t0 + dur);
    }

    function noiseSweep(dur, fStart, fEnd, gain=0.25) {
      if (!ensure() || muted) return;
      const t0 = ctx.currentTime;
      const src = ctx.createBufferSource();
      src.buffer = noiseBuf;
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.Q.value = 4;
      filt.frequency.setValueAtTime(fStart, t0);
      filt.frequency.linearRampToValueAtTime(fEnd, t0 + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(gain, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      src.connect(filt).connect(g).connect(master);
      src.start(t0);
      src.stop(t0 + dur);
    }

    return {
      get muted() { return muted; },
      toggleMute() {
        muted = !muted;
        if (master) master.gain.value = muted ? 0 : 0.5;
      },
      // Heartbeat: BPM scales with (1 - timeScale). Frozen → slow steady pulse.
      // Beats above ~0.95 timeScale are suppressed (drowned by chaos).
      heartbeat(now, timeScale) {
        if (!ensure() || muted || timeScale > 0.95) return;
        const interval = 0.5 + timeScale * 0.5; // 0.5s frozen → 1.0s busy
        if (now - lastHeartbeat < interval * 1000) return;
        lastHeartbeat = now;
        tone(60, 0.12, 'sine', 0.4 * (1 - timeScale));
      },
      fire()       { noise(0.08, 1500, 0.25); },
      enemyFire()  { noise(0.06, 2800, 0.12); },
      hit()        { tone(120, 0.18, 'sine', 0.4, 60); noise(0.05, 4000, 0.2); },
      death()      { tone(220, 1.0, 'sawtooth', 0.4, 50); },
      whoosh(now, mouseVel) {
        if (mouseVel > 800) {
          if (!fastInputSince) fastInputSince = now;
          if (now - fastInputSince > 100 && now - lastWhoosh > 600) {
            lastWhoosh = now;
            noiseSweep(0.25, 400, 1800, 0.2);
          }
        } else {
          fastInputSince = 0;
        }
      },
      // Force-resume on user gesture
      kick() { ensure(); if (ctx && ctx.state === 'suspended') ctx.resume(); },
    };
  })();
  // Wire mute toggle + first-gesture audio kick
  addEventListener('keydown', e => {
    Audio.kick();
    if (e.key.toLowerCase() === 'm') Audio.toggleMute();
  });
  addEventListener('mousedown', () => Audio.kick());

  function resetGame() {
    bullets.length = 0;
    playerBullets.length = 0;
    currentWave = 1;
    waveClearTimer = 0;
    shooters = makeWave(currentWave);
    player.x = W / 2; player.y = H / 2;
    kills = 0; fireTimer = 0; elapsed = 0; nearMisses = 0; finalScore = 0;
    gameState = 'playing';
  }
  // Restart bindings
  addEventListener('keydown', e => {
    if (gameState === 'dead' && e.key.toLowerCase() === 'r') resetGame();
  });
  addEventListener('mousedown', e => {
    if (gameState === 'dead' && e.button === 0) resetGame();
  });

  // ---------- Loop ----------
  let lastT = performance.now();
  function frame(now) {
    // Clamp huge gaps (tab switch, etc.) so physics doesn't explode.
    const dtReal = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;

    const { scale: timeScale, velocity: mouseVel } = computeTimeScale(now);
    // Death freezes everything (world AND player). Mouse-time scale still
    // displayed in HUD so the player can verify input is registered.
    const dtWorld = gameState === 'playing' ? dtReal * timeScale : 0;
    const dtSim   = gameState === 'playing' ? dtReal : 0;

    if (gameState === 'playing') elapsed += dtReal;
    Audio.heartbeat(now, timeScale);
    Audio.whoosh(now, mouseVel);

    // --- Player: REAL time, independent of mouse ---
    let dx = 0, dy = 0;
    if (keys.has('w') || keys.has('arrowup'))    dy -= 1;
    if (keys.has('s') || keys.has('arrowdown'))  dy += 1;
    if (keys.has('a') || keys.has('arrowleft'))  dx -= 1;
    if (keys.has('d') || keys.has('arrowright')) dx += 1;
    if ((dx || dy) && gameState === 'playing') {
      const m = Math.hypot(dx, dy);
      player.x += (dx / m) * PLAYER_SPEED * dtSim;
      player.y += (dy / m) * PLAYER_SPEED * dtSim;
    }
    player.x = Math.max(PLAYER_RADIUS, Math.min(W - PLAYER_RADIUS, player.x));
    player.y = Math.max(PLAYER_RADIUS, Math.min(H - PLAYER_RADIUS, player.y));

    // --- Player firing: REAL-time cooldown ---
    fireTimer = Math.max(0, fireTimer - dtSim);
    if (mouseDown && fireTimer <= 0 && gameState === 'playing') {
      const ax = mouseX - player.x, ay = mouseY - player.y;
      const m = Math.hypot(ax, ay) || 1;
      playerBullets.push({
        x: player.x, y: player.y,
        vx: (ax / m) * PLAYER_BULLET_SPEED,
        vy: (ay / m) * PLAYER_BULLET_SPEED,
        trail: [],
      });
      fireTimer = FIRE_COOLDOWN;
      muzzleFlash = 1;
      Audio.fire();
    }

    // --- Shooters: WORLD time. Walkers drift toward random offsets. ---
    for (let si = shooters.length - 1; si >= 0; si--) {
      const s = shooters[si];
      // Walker movement: pick a random nearby target every retargetIn seconds,
      // drift toward it at 40 px/s (world time). Keeps shooters from sitting still.
      if (s.type === 'walker') {
        s.retargetIn -= dtWorld;
        if (s.retargetIn <= 0) {
          s.retargetIn = 2;
          s.tx = Math.max(50, Math.min(W - 50, s.x + (Math.random() - 0.5) * 200));
          s.ty = Math.max(50, Math.min(H - 50, s.y + (Math.random() - 0.5) * 200));
        }
        const dxw = s.tx - s.x, dyw = s.ty - s.y;
        const dm = Math.hypot(dxw, dyw);
        if (dm > 1) {
          s.x += (dxw / dm) * 40 * dtWorld;
          s.y += (dyw / dm) * 40 * dtWorld;
        }
      }
      s.cooldown -= dtWorld;
      if (s.cooldown <= 0) {
        s.cooldown += s.fireInterval;
        if (s.type !== 'boss') shooterFire(s);
        // boss firing handled separately in cycle 7
      }
    }

    // --- Wave clear ---
    if (gameState === 'playing' && shooters.length === 0 && waveClearTimer <= 0) {
      waveClearTimer = 1.5;
    }
    if (waveClearTimer > 0) {
      waveClearTimer -= dtReal;
      if (waveClearTimer <= 0 && gameState === 'playing') {
        currentWave++;
        if (currentWave > 20) {
          // Beyond wave 20 → win handled in cycle 7. For cycle 6, wrap.
          currentWave = 20;
        }
        shooters = makeWave(currentWave);
        bullets.length = 0;
      }
    }

    // --- Player bullets: WORLD time. Pre-aim while frozen, release on flick. ---
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      if (dtWorld > 0) {
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > TRAIL_LEN) b.trail.shift();
      }
      b.x += b.vx * dtWorld;
      b.y += b.vy * dtWorld;
      // off-screen
      if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
        playerBullets.splice(i, 1);
        continue;
      }
      // vs enemy bullets — both removed
      let consumed = false;
      for (let j = bullets.length - 1; j >= 0; j--) {
        const eb = bullets[j];
        if (Math.hypot(b.x - eb.x, b.y - eb.y) < PLAYER_BULLET_RADIUS + BULLET_RADIUS) {
          bullets.splice(j, 1);
          playerBullets.splice(i, 1);
          consumed = true;
          break;
        }
      }
      if (consumed) continue;
      // vs shooters — kill and remove
      for (let j = shooters.length - 1; j >= 0; j--) {
        const s = shooters[j];
        if (Math.hypot(b.x - s.x, b.y - s.y) < PLAYER_BULLET_RADIUS + SHOOTER_RADIUS) {
          shooters.splice(j, 1);
          playerBullets.splice(i, 1);
          kills++;
          shakeTime = SHAKE_DURATION;
          Audio.hit();
          break;
        }
      }
    }

    // --- Bullets: WORLD time ---
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      // Record trail sample only when world is actually advancing — frozen
      // bullets keep their trail static, which is exactly the cinematic look.
      if (dtWorld > 0) {
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > TRAIL_LEN) b.trail.shift();
      }
      b.x += b.vx * dtWorld;
      b.y += b.vy * dtWorld;
      const d = Math.hypot(b.x - player.x, b.y - player.y);
      // hit
      if (d < BULLET_RADIUS + PLAYER_RADIUS && gameState === 'playing') {
        gameState = 'dead';
        finalScore = Math.floor(kills * 100 + elapsed * 5 + nearMisses * 10);
        bullets.splice(i, 1);
        Audio.death();
        continue;
      }
      // near-miss: count once per bullet when it passes within 30px without hitting
      if (!b.nearMissed && d < 30 + PLAYER_RADIUS && gameState === 'playing') {
        b.nearMissed = true;
        nearMisses++;
      }
      if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
        bullets.splice(i, 1);
      }
    }

    // --- Render ---
    shakeTime = Math.max(0, shakeTime - dtReal);
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shakeTime > 0) {
      const t = shakeTime / SHAKE_DURATION;
      const a = SHAKE_AMPLITUDE * t;
      ctx.translate((Math.random() - 0.5) * a * 2, (Math.random() - 0.5) * a * 2);
    }

    // shooters
    for (const s of shooters) {
      ctx.save();
      ctx.translate(s.x, s.y);
      if (s.type === 'boss') {
        // Boss hexagon (cycle 7 expands phases). Slowly rotates in WORLD time.
        s.rot = (s.rot || 0) + dtWorld * 0.5;
        ctx.rotate(s.rot);
        const dangerGlow = s.phase >= 4;
        if (dangerGlow) {
          const rg = ctx.createRadialGradient(0, 0, 30, 0, 0, 90);
          rg.addColorStop(0, 'rgba(220,0,0,0.5)');
          rg.addColorStop(1, 'rgba(220,0,0,0)');
          ctx.fillStyle = rg;
          ctx.beginPath(); ctx.arc(0, 0, 90, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = '#000';
        ctx.beginPath();
        for (let k = 0; k < 6; k++) {
          const a = (k / 6) * Math.PI * 2;
          const x = Math.cos(a) * 50, y = Math.sin(a) * 50;
          if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill();
      } else {
        // Triangle aimed at player
        const ang = Math.atan2(player.y - s.y, player.x - s.x);
        ctx.rotate(ang);
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.moveTo(14, 0); ctx.lineTo(-10, -10); ctx.lineTo(-10, 10);
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }

    // Bullet trails — render BEFORE bullets so heads sit on top.
    // Static when world is frozen → that's the signature cinematic detail.
    function drawTrail(b, color) {
      if (!b.trail || b.trail.length < 2) return;
      const pts = b.trail.concat([{ x: b.x, y: b.y }]);
      for (let k = 1; k < pts.length; k++) {
        const a = (k / pts.length) * 0.5;
        ctx.strokeStyle = color.replace('ALPHA', a.toFixed(3));
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(pts[k - 1].x, pts[k - 1].y);
        ctx.lineTo(pts[k].x, pts[k].y);
        ctx.stroke();
      }
    }
    for (const b of bullets)       drawTrail(b, 'rgba(220,0,0,ALPHA)');
    for (const b of playerBullets) drawTrail(b, 'rgba(0,128,255,ALPHA)');

    // bullets (enemy, red)
    ctx.fillStyle = '#d00';
    for (const b of bullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, BULLET_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    // player bullets (blue)
    ctx.fillStyle = '#0080ff';
    for (const b of playerBullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, PLAYER_BULLET_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    // aim line (dashed grey, faint) — player → mouse
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(mouseX, mouseY);
    ctx.stroke();
    ctx.restore();

    // player glow (soft white halo behind body)
    const glow = ctx.createRadialGradient(player.x, player.y, 2, player.x, player.y, 28);
    glow.addColorStop(0, 'rgba(255,255,255,0.7)');
    glow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 28, 0, Math.PI * 2);
    ctx.fill();

    // player (white fill, black outline)
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, PLAYER_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // muzzle flash — 1 frame, at player position, oriented at mouse
    if (muzzleFlash > 0) {
      const ang = Math.atan2(mouseY - player.y, mouseX - player.x);
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(ang);
      ctx.fillStyle = 'rgba(255,240,180,0.9)';
      ctx.beginPath();
      ctx.moveTo(PLAYER_RADIUS, 0);
      ctx.lineTo(PLAYER_RADIUS + 18, -6);
      ctx.lineTo(PLAYER_RADIUS + 26, 0);
      ctx.lineTo(PLAYER_RADIUS + 18, 6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      muzzleFlash--;
    }

    ctx.restore(); // close shake transform

    // Frozen vignette — drawn AFTER shake-transform restore so it's screen-space
    if (timeScale < 0.3 && gameState === 'playing') {
      const fade = (0.3 - timeScale) / 0.3; // 0..1
      const grad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
      grad.addColorStop(0, 'rgba(170,204,255,0)');
      grad.addColorStop(1, `rgba(170,204,255,${(0.15 * fade).toFixed(3)})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    // HUD
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60).toString().padStart(2, '0');
    hud.textContent =
      `wave:        ${currentWave}/20\n` +
      `time scale:  ${timeScale.toFixed(2)}\n` +
      `mouse vel:   ${mouseVel.toFixed(0).padStart(4)} px/s\n` +
      `bullets:     ${bullets.length}\n` +
      `kills:       ${kills}\n` +
      `time:        ${mins}:${secs}\n` +
      `audio:       ${Audio.muted ? '🔇' : '🔊'}`;

    // Wave-clear flash overlay
    if (waveClearTimer > 0) {
      const a = Math.min(1, waveClearTimer / 1.5);
      ctx.fillStyle = `rgba(255,255,255,${(a * 0.5).toFixed(3)})`;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.font = 'bold 48px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillText(`WAVE ${currentWave} CLEARED`, W / 2, H / 2);
      ctx.textAlign = 'start';
    }

    // Death overlay
    if (gameState === 'dead') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.font = 'bold 64px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillText('BULLET TIME', W / 2, H / 2 - 80);
      ctx.font = '20px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillText(
        `TIME: ${elapsed.toFixed(1)}s   KILLS: ${kills}   SCORE: ${finalScore}`,
        W / 2, H / 2,
      );
      ctx.font = '16px ui-monospace, Menlo, Consolas, monospace';
      ctx.fillStyle = '#666';
      ctx.fillText('PRESS R OR CLICK TO RESTART', W / 2, H / 2 + 60);
      ctx.textAlign = 'start';
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
